name: Frontend Docker CI/CD

on:
  push:
    branches: [ "main", "development" ]
    paths:
      # ── Archivos que afectan el build de la imagen ──
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "dockerfile"
      - "nginx.conf"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Determina el ambiente según la rama que disparó el workflow
      - name: Set environment config
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_OUTPUT
            echo "API_URL=${{ secrets.VITE_API_URL_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=development" >> $GITHUB_OUTPUT
            echo "API_URL=${{ secrets.VITE_API_URL_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate custom identifiers
        id: vars
        run: |
          echo "TS=$(date +'%Y%m%d_%H%M')" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag por ambiente (ej: production-latest, development-latest)
            type=raw,value=${{ steps.config.outputs.ENV_NAME }}-latest

            # Tag detallado con timestamp y SHA
            type=raw,value=${{ steps.config.outputs.ENV_NAME }}-${{ steps.vars.outputs.TS }}-${{ steps.vars.outputs.SHORT_SHA }}

            # Tag estándar por Git SHA
            type=sha,format=short

      # El .env.production se crea con la URL correcta según el ambiente
      - name: Create environment file
        run: |
          echo "VITE_API_URL=${{ steps.config.outputs.API_URL }}" > .env.production

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Workflow Summary
        run: |
          echo "### Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** ${{ steps.config.outputs.ENV_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.config.outputs.ENV_NAME }}-${{ steps.vars.outputs.TS }}-${{ steps.vars.outputs.SHORT_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to Development Server
    needs: build-and-push
    if: github.ref_name == 'development'
    runs-on: ubuntu-latest
    concurrency: deploy-development
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_IP }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWORD }}
          port: ${{ secrets.DEV_SERVER_PORT }}
          script: |
            cd /opt/public_html/SIGEC
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -a -f

  deploy-prod:
    name: Deploy to Production Server
    needs: build-and-push
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    concurrency: deploy-production
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          password: ${{ secrets.PROD_SERVER_PASSWORD }}
          port: ${{ secrets.PROD_SERVER_PORT }}
          script: |
            cd /opt/public_html/SIGEC
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -a -f
